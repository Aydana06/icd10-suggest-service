# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Spring Application Name
spring.application.name=ICD-10 Diagnosis Service

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:hospital_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (testing)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# API Documentation (Swagger/OpenAPI)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# External API Configuration
icd10.api.url=https://raw.githubusercontent.com/smog1210/2022-ICD-10-CM-JSON/refs/heads/main/icd10cm_codes_2022-2.json
icd10.api.timeout=5000

# Logging
logging.level.root=INFO
logging.level.mn.hospital=DEBUG